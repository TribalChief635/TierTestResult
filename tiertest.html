<!DOCTYPE html>
<html>

<head>
<title>Tier List</title>

<style>

body{
background:#0b1220;
font-family:Arial;
color:white;
}

.container{
display:flex;
gap:20px;
padding:20px;
}

.tier{
background:#1b2538;
border-radius:8px;

}

.tier h2{
text-align:center;
padding:10px;
margin:0;
}

.tier1{background:#d4a017;}
.tier2{background:#9aa0a6;}
.tier3{background:#b87333;}
.tier4{background:#2a3248;}
.tier5{background:#2a3248;}

.name{
padding:8px;
border-top:1px solid #2c3550;
}

</style>
</head>

<body>

<div class="container">

<div class="tier">
<h2 class="tier1">🏆 Tier 1</h2>

<div class="name">Tribal Chief</div>
<div class="name">Hazem_65</div>
<div class="name">oth0098</div>

</div>

<div class="tier">
<h2 class="tier2">🥈 Tier 2</h2>

<div class="name">Player4</div>
<div class="name">Player5</div>

</div>

<div class="tier">
<h2 class="tier3">🥉 Tier 3</h2>

<div class="name">Player6</div>
<div class="name">Player7</div>

</div>

<div class="tier">
<h2 class="tier4">Tier 4</h2>

<div class="name">Player8</div>

</div>

<div class="tier">
<h2 class="tier5">Tier 5</h2>

<div class="name">Player9</div>

</div>

</div>

</body>
</html>
