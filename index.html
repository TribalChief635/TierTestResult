<!DOCTYPE html>
<html>

<head>
<title>Tier Test Leaderboard</title>

<style>

body{
background:#0b1220;
font-family:Arial;
color:white;
margin:0;
}

.title{
text-align:center;
font-size:32px;
padding:20px;
font-weight:bold;
}

.container{
display:flex;
gap:20px;
padding:20px;
justify-content:center;
}

.tier{
background:#1b2538;
border-radius:8px;
width:220px;
min-height:200px;
}

.tier h2{
text-align:center;
padding:10px;
margin:0;
}

.tierS{background:#ff4d4d;}
.tierA{background:#ff944d;}
.tierB{background:#ffd24d;}
.tierC{background:#4da6ff;}
.tierD{background:#2a3248;}

.name{
padding:8px;
border-top:1px solid #2c3550;
cursor:grab;
}

</style>
</head>

<body>

<div class="title">Tier Test Leaderboard</div>

<div class="container">

<div class="tier" ondrop="drop(event)" ondragover="allowDrop(event)">
<h2 class="tierS">S</h2>

<div class="name" draggable="true" ondragstart="drag(event)" id="p1">Tribal Chief</div>
<div class="name" draggable="true" ondragstart="drag(event)" id="p2">Hazem_65</div>
<div class="name" draggable="true" ondragstart="drag(event)" id="p3">oth0098</div>
<div class="name" draggable="true" ondragstart="drag(event)" id="p3">L1CH</div>
  
</div>

<div class="tier" ondrop="drop(event)" ondragover="allowDrop(event)">
<h2 class="tierA">A</h2>

<div class="name" draggable="true" ondragstart="drag(event)" id="p4">Player4</div>
<div class="name" draggable="true" ondragstart="drag(event)" id="p5">Player5</div>

</div>

<div class="tier" ondrop="drop(event)" ondragover="allowDrop(event)">
<h2 class="tierB">B</h2>

<div class="name" draggable="true" ondragstart="drag(event)" id="p6">Player6</div>
<div class="name" draggable="true" ondragstart="drag(event)" id="p7">Player7</div>

</div>

<div class="tier" ondrop="drop(event)" ondragover="allowDrop(event)">
<h2 class="tierC">C</h2>

<div class="name" draggable="true" ondragstart="drag(event)" id="p8">Player8</div>

</div>

<div class="tier" ondrop="drop(event)" ondragover="allowDrop(event)">
<h2 class="tierD">D</h2>

<div class="name" draggable="true" ondragstart="drag(event)" id="p9">Player9</div>

</div>

</div>

<script>

function allowDrop(ev) {
ev.preventDefault();
}

function drag(ev) {
ev.dataTransfer.setData("text", ev.target.id);
}

function drop(ev) {
ev.preventDefault();
var data = ev.dataTransfer.getData("text");
ev.target.closest(".tier").appendChild(document.getElementById(data));
}

</script>

</body>
</html>
